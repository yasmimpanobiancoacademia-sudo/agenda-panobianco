<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agenda de Consultores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b93;
  --blue-bg:#deeaf7;--blue-tc:#1a4f82;
  --green-bg:#d8f0d0;--green-tc:#1e5c1a;
  --purple-bg:#c8e8c0;--purple-tc:#1a5216;
  --amber-bg:#fdefd0;--amber-tc:#7a4800;
  --red:#c0392b;--r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app-topbar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;padding:0 20px;align-items:stretch}
.app-tab{font-size:13px;font-weight:500;padding:14px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.app-tab:hover{color:var(--text)}
.app-tab.active{color:var(--text);border-bottom-color:var(--text)}
.app-tab-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--surface2);color:var(--text2)}
.app-tab.active .app-tab-badge{background:var(--text);color:#fff}
.topbar-date{margin-left:auto;display:flex;align-items:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;padding:0 4px}
.main{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-val{font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.tab-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{font-size:13px;font-weight:500;padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
select,input[type=date]{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none}
select:focus,input[type=date]:focus{border-color:var(--border2)}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-danger{color:var(--red);border-color:#f5c6c3}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-success{background:#1e5c1a;color:#fff;border-color:#1e5c1a}
.btn-success:hover{background:#164d14}
.btn-cancel{color:#7a1a1a;border-color:#f5c6c3;background:#fff5f5}
.btn-cancel:hover{background:#fee2e2}
.sb-ca{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fee2e2;color:#7a1a1a}
.transp-section{margin-top:14px}
.transp-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.transp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;min-width:110px;flex:1}
.transp-card-icon{font-size:18px;margin-bottom:4px}
.transp-card-val{font-size:22px;font-weight:700;color:var(--text)}
.transp-card-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.transp-card-week{font-size:10px;color:var(--text3);margin-top:1px}
.metric-card-alert{background:#fff5f5;border:1px solid #f5c6c3;border-radius:var(--r);padding:14px 16px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-label{font-size:14px;font-weight:600;min-width:130px;text-align:center}
.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:auto}
.gantt-inner{min-width:700px}
.zoom-bar{display:flex;align-items:center;gap:10px;padding:6px 0 4px 0;font-size:12px;color:var(--text2)}
.zoom-bar input[type=range]{width:140px;accent-color:var(--text)}
.gantt-head{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.g-name-col{min-width:260px;width:260px;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);border-right:1px solid var(--border);flex-shrink:0}
.g-days-row{flex:none;display:flex}
.g-day-hdr{flex:none;width:var(--day-w,40px);text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);padding:8px 2px;border-right:1px solid var(--border)}
.g-day-hdr:last-child{border-right:none}
.g-day-hdr.wknd{background:#fef9c3;color:#854d0e}
.g-row{display:flex;border-bottom:1px solid var(--border);min-height:46px}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:#fafaf8}
.g-name{min-width:260px;width:260px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--text);border-right:1px solid var(--border);display:block;flex-shrink:0;overflow:hidden}
.g-cells{flex:1;display:flex;position:relative;align-items:stretch}
.g-cell{flex:none;width:var(--day-w,40px);height:100%;border-right:1px solid var(--border);position:relative}
.g-cell:last-child{border-right:none}
.g-cell.wknd{background:#fef9c3}
.g-block{position:absolute;height:26px;border-radius:5px;font-size:10px;font-weight:500;padding:0 6px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;cursor:pointer;z-index:2;transition:opacity .1s}
.g-block:hover{opacity:.82}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:12px}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.ind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px}
.ind-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ind-info{flex:1;min-width:130px}
.ind-name{font-size:13px;font-weight:600}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill-m{background:var(--blue-bg);color:var(--blue-tc)}
.pill-a{background:var(--purple-bg);color:var(--purple-tc)}
.ind-bar-wrap{flex:2;min-width:120px}
.ind-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:3px}
.ind-bar-fill{height:100%;border-radius:3px}
.ind-bar-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.ind-pct{font-size:15px;font-weight:600;min-width:44px;text-align:right;font-family:'DM Mono',monospace}
.cons-pick-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:16px}
.cons-pick-title{font-size:15px;font-weight:600;margin-bottom:4px}
.cons-pick-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.cons-pick-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cons-pick-row select{font-size:14px;padding:9px 12px;flex:1;min-width:200px;max-width:360px}
.cons-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cons-hname{font-size:17px;font-weight:600;letter-spacing:-.02em}
.cons-hsub{font-size:12px;color:var(--text2);margin-top:2px}
.cons-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.cons-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}
.cons-stat .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px}
.cons-stat .val{font-size:20px;font-weight:600;letter-spacing:-.03em}
.cons-stat .sub{font-size:10px;color:var(--text3);margin-top:2px}
.visit-list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.vlist-header{padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.vlist-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.visit-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.visit-row:last-child{border-bottom:none}
.visit-row:hover{background:#fafaf8}
.visit-unidade{font-size:13px;font-weight:500;flex:1;min-width:140px}
.visit-date{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap}
.sb-ag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--amber-bg);color:var(--amber-tc)}
.sb-re{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green-tc)}
.tb-m{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--blue-bg);color:var(--blue-tc)}
.tb-a{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple-tc)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-box{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:20px;width:350px;max-width:100%;animation:mIn .15s ease;max-height:90vh;overflow-y:auto}
@keyframes mIn{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.form-row label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.form-row input,.form-row select{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus{border-color:var(--text)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.conf-alert{background:var(--amber-bg);border:1px solid #e8c870;border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--amber-tc);margin-bottom:12px;display:none}
.conf-alert.show{display:block}
.empty{padding:24px;text-align:center;font-size:13px;color:var(--text3)}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
#map-container{width:100%;height:520px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.map-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.map-leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.map-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.map-filter-bar label{font-size:12px;color:var(--text2)}
</style>
</head>

// ─── FERIADOS ──────────────────────────────────────────────────────────────────
const FERIADOS_FIXOS=[[1,1],[4,21],[5,1],[9,7],[10,12],[11,2],[11,15],[12,25]];
function isFeriado(y,m,d){
  if(FERIADOS_FIXOS.some(([fm,fd])=>fm===m+1&&fd===d))return true;
  // Páscoa (algoritmo)
  const a=y%19,b=Math.floor(y/100),c=y%100,d2=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d2-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m2=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m2+114)/31),day=((h+l-7*m2+114)%31)+1;
  const easter=new Date(y,month-1,day);
  const sexta=new Date(easter);sexta.setDate(easter.getDate()-2);
  const corpus=new Date(easter);corpus.setDate(easter.getDate()+60);
  return(m===sexta.getMonth()&&d===sexta.getDate())||(m===easter.getMonth()&&d===easter.getDate())||(m===corpus.getMonth()&&d===corpus.getDate());
}


// ─── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(s==='ok')el.textContent='✓ sincronizado';
  else if(s==='err')el.textContent='⚠ sem conexão';
  else if(s==='syncing')el.textContent='⟳ sincronizando...';
  else el.textContent='';
}
function loadLocal(){
  try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);eventos=d.eventos||[];nextId=d.nextId||1;}}catch(e){}
}
async function loadFromSheets(){
  if(SHEETS_URL==='COLE_AQUI_A_URL_DO_APPS_SCRIPT')return false;
  try{
    setSyncStatus('syncing');
    const r=await fetch(SHEETS_URL+'?action=get');
    if(!r.ok)throw new Error();
    const d=await r.json();
    // Só atualiza se tiver dados na nuvem E forem mais recentes (mais eventos)
    if(d.eventos && d.nextId && d.nextId > nextId){
      eventos=d.eventos;
      nextId=d.nextId;
      save();
    }
    setSyncStatus('ok');return true;
  }catch(e){setSyncStatus('err');return false;}
}
async function syncToSheets(){
  if(SHEETS_URL==='COLE_AQUI_A_URL_DO_APPS_SCRIPT')return;
  if(syncando)return;syncando=true;
  setSyncStatus('syncing');
  try{
    const encoded = encodeURIComponent(JSON.stringify({eventos,nextId}));
    const url = SHEETS_URL+'?action=set&data='+encoded;
    // Use image trick to bypass CORS for sending data
    await new Promise((resolve)=>{
      const img = new Image();
      img.onload = img.onerror = ()=>resolve();
      img.src = url;
      setTimeout(resolve, 3000);
    });
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
  syncando=false;
}

// ─── CONFLICT ─────────────────────────────────────────────────────────────────
function conflict(cons,tipo,ini,exId,uni){
  const d=parseD(ini),y=d.getFullYear(),mo=d.getMonth();
  return eventos.filter(e=>{
    if(e.id===exId||e.consultor!==cons||e.tipo!==tipo||e.unidade!==uni)return false;
    const ed=parseD(e.inicio);
    return tipo==='mensal'
      ?(ed.getFullYear()===y&&ed.getMonth()===mo)
      :(ed.getFullYear()===y&&Math.floor(ed.getMonth()/6)===Math.floor(mo/6));
  });
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function stats(evts){
  const all=evts;
  const active=evts.filter(e=>e.status!=='cancelado');
  const tot=active.length,real=active.filter(e=>e.status==='realizado').length;
  const totM=active.filter(e=>e.tipo==='mensal').length,realM=active.filter(e=>e.tipo==='mensal'&&e.status==='realizado').length;
  const totA=active.filter(e=>e.tipo==='auditoria').length,realA=active.filter(e=>e.tipo==='auditoria'&&e.status==='realizado').length;
  const canc=all.filter(e=>e.status==='cancelado').length;
  const cancM=all.filter(e=>e.status==='cancelado'&&e.tipo==='mensal').length;
  const cancA=all.filter(e=>e.status==='cancelado'&&e.tipo==='auditoria').length;
  const totAgend=all.filter(e=>e.status==='agendado'||e.status==='cancelado').length;
  const pctCanc=totAgend?Math.round(canc/totAgend*100):0;
  return{tot,real,totM,realM,totA,realA,canc,cancM,cancA,pctCanc,tx:tot?Math.round(real/tot*100):0,txM:totM?Math.round(realM/totM*100):0,txA:totA?Math.round(realA/totA*100):0};
}

// ─── TRANSPORTE SEMANAL ───────────────────────────────────────────────────────
function hTransporte() {
  const TRANSP = {
    aviao:                {icon:'✈', label:'Avião',           color:'#1a4f82'},
    carro_proprio:        {icon:'🚗', label:'Carro próprio',  color:'#1e5c1a'},
    frota:                {icon:'🚙', label:'Frota',           color:'#3d2e8f'},
    onibus:               {icon:'🚌', label:'Ônibus',          color:'#7a4800'},

    transporte_aplicativo:{icon:'📱', label:'Aplicativo',      color:'#0e4f40'},
  };

  // Current week bounds (Mon-Sun)
  const now = new Date();
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1; // 0=Mon
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - dow); weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23,59,59,999);
  const ws = weekStart.toISOString().slice(0,10);
  const we = weekEnd.toISOString().slice(0,10);

  // All events with transport
  const withTransp = eventos.filter(e => e.transporte && e.status !== 'cancelado');
  // This week
  const thisWeek = withTransp.filter(e => e.inicio >= ws && e.inicio <= we);

  // Count totals and weekly (show all types always)
  const totals = {}, weekly = {};
  withTransp.forEach(e => { totals[e.transporte] = (totals[e.transporte]||0)+1; });
  thisWeek.forEach(e => { weekly[e.transporte] = (weekly[e.transporte]||0)+1; });

  const sorted = Object.keys(TRANSP);

  const cards = sorted.map(k => {
    const {icon, label, color} = TRANSP[k];
    const tot = totals[k] || 0;
    const wk = weekly[k] || 0;
    return `<div class="transp-card">
      <div class="transp-card-icon">${icon}</div>
      <div class="transp-card-val" style="color:${color}">${tot}</div>
      <div class="transp-card-lbl">${label}</div>
      <div class="transp-card-week">Esta semana: ${wk}</div>
    </div>`;
  }).join('');

  const weekLabel = `${weekStart.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})} – ${weekEnd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}`;
  return `<div class="transp-section">
    <div class="section-label">Transporte utilizado · semana ${weekLabel}</div>
    <div class="transp-grid">${cards}</div>
  </div>`;
}

// ─── GANTT HTML ───────────────────────────────────────────────────────────────
function hGantt(y,m,fc,ft,editFn,newFn,showFc,zoom=100){
  const days=dim(y,m);
  const ef=eventos.filter(e=>{
    const d=parseD(e.inicio);
    if(d.getFullYear()!==y||d.getMonth()!==m)return false;
    if(fc!=='todos'&&e.consultor!==fc)return false;
    if(ft!=='todos'&&e.tipo!==ft)return false;
    return true;
  });
  const cv=fc==='todos'?CONS:[fc];
  const dayH=Array.from({length:days},(_,i)=>{const dw=new Date(y,m,i+1).getDay(),w=dw===0||dw===6||isFeriado(y,m,i+1);return`<div class="g-day-hdr${w?' wknd':''}">${i+1}</div>`;}).join('');
  const rows=cv.length?cv.map(c=>{
    const ec=ef.filter(e=>e.consultor===c);
    // células de fundo (fins de semana + estrutura)
    const cells=Array.from({length:days},(_,i)=>{
      const dw=new Date(y,m,i+1).getDay(),w=dw===0||dw===6||isFeriado(y,m,i+1);
      return`<div class="g-cell${w?' wknd':''}"></div>`;
    }).join('');
    // blocos com suporte a múltiplos eventos sobrepostos (lane stacking)
    const LANE_H=26, LANE_GAP=3, LANE_TOP=6;
    // calcular lane de cada evento para evitar sobreposição visual
    const laneEvts=ec.map(evt=>{
      const startD=parseD(evt.inicio),endD=parseD(evt.fim);
      const monthStart=new Date(y,m,1),monthEnd=new Date(y,m,days);
      const clampStart=startD<monthStart?monthStart:startD;
      const clampEnd=endD>monthEnd?monthEnd:endD;
      const startIdx=clampStart.getDate()-1;
      const endIdx=clampEnd.getDate()-1;
      return{evt,startIdx,endIdx};
    });
    // atribuir lane: menor lane livre que não conflita
    const assigned=[];
    laneEvts.forEach(item=>{
      let lane=0;
      while(assigned.some(a=>a.lane===lane&&a.endIdx>=item.startIdx&&a.startIdx<=item.endIdx)) lane++;
      assigned.push({...item,lane});
    });
    const totalLanes=assigned.length?Math.max(...assigned.map(a=>a.lane))+1:1;
    const rowH=LANE_TOP*2+totalLanes*LANE_H+(totalLanes-1)*LANE_GAP;
    const blocks=assigned.map(({evt,startIdx,endIdx,lane})=>{ 
      const span=endIdx-startIdx+1;
      const dayW=Math.round(40*zoom/100);
      const leftPx2=startIdx*dayW;
      const widthPx2=span*dayW-4;
      const topPx=LANE_TOP+lane*(LANE_H+LANE_GAP);
      let bg,tc,strikeStyle='';
      if(evt.status==='cancelado'){bg='#c0392b';tc='#ffffff';strikeStyle='text-decoration:line-through;opacity:0.85';}
      else if(evt.tipo==='mensal'){bg=evt.status==='realizado'?'#1a4f82':'#deeaf7';tc=evt.status==='realizado'?'#ffffff':'#1a4f82';}
      else if(evt.tipo==='treinamento'){bg=evt.status==='realizado'?'#c2410c':'#ffedd5';tc=evt.status==='realizado'?'#ffffff':'#c2410c';}
      else if(evt.tipo==='home_office'){bg=evt.status==='realizado'?'#6b21a8':'#ede9fe';tc=evt.status==='realizado'?'#ffffff':'#6b21a8';}
      else if(evt.tipo==='ferias'){bg=evt.status==='realizado'?'#0e7490':'#cffafe';tc=evt.status==='realizado'?'#ffffff':'#0e7490';}
      else if(evt.tipo==='banco_horas'){bg=evt.status==='realizado'?'#4a4a4a':'#e5e5e5';tc=evt.status==='realizado'?'#ffffff':'#4a4a4a';}
      else{bg=evt.status==='realizado'?'#2d6a27':'#c8e8c0';tc=evt.status==='realizado'?'#ffffff':'#1a5216';}
      const _city=getCity(evt.unidade);const nm=_city?_city+' · '+evt.unidade:evt.unidade;
      return`<div class="g-block" style="left:${leftPx2+2}px;width:${widthPx2}px;top:${topPx}px;background:${bg};color:${tc};${strikeStyle}" onclick="${editFn}(${evt.id})" title="${evt.unidade}${getCity(evt.unidade)?' · '+getCity(evt.unidade):''} | ${evt.tipo} | ${evt.status}${evt.status==='cancelado'?' ⚠ CANCELADO'+(evt.motivoCancelamento?' · '+evt.motivoCancelamento:''):''}">${evt.status==='cancelado'?'✕ ':''} ${nm}</div>`;
    }).join('');
    const cellsWithH=Array.from({length:days},(_,i)=>{
      const dw=new Date(y,m,i+1).getDay(),w=dw===0||dw===6||isFeriado(y,m,i+1);
      return`<div class="g-cell${w?' wknd':''}" style="min-height:${rowH}px"></div>`;
    }).join('');
    const nameHtml=`<div style="font-size:13px;font-weight:600">${c}</div>`;
    return`<div class="g-row" style="min-height:${rowH}px"><div class="g-name" style="min-height:${rowH}px">${nameHtml}</div><div class="g-cells" style="min-height:${rowH}px">${cellsWithH}${blocks}</div></div>`;
  }).join(''):'<div class="empty">Nenhuma visita neste período.</div>';

  const isG=editFn==='gEdit';
  const prevFn=isG?'gPrev':'cPrev',nextFn=isG?'gNext':'cNext';
  const ftChange=isG?`gFt=this.value;rG()`:`cFt=this.value;rC()`;
  const fcOpts=CONS.map(c=>`<option value="${c}" ${fc===c?'selected':''}>${c}</option>`).join('');

  const zoomId=editFn==='gEdit'?'gZoomRange':'cZoomRange';
  const zoomFn=editFn==='gEdit'?'gZoom=+this.value;rG()':'cZoom=+this.value;rC()';
  return `<div class="zoom-bar">
    <label>📅 Largura dos dias: <strong>${Math.round(40*zoom/100)}px/dia</strong></label>
    <input id="${zoomId}" type="range" min="25" max="200" step="5" value="${zoom}" oninput="${zoomFn}">
  </div>
  <div class="toolbar">
    <div class="month-nav">
      <button class="btn" onclick="${prevFn}()">&#8592;</button>
      <div class="month-label">${MONTHS[m]} ${y}</div>
      <button class="btn" onclick="${nextFn}()">&#8594;</button>
    </div>
    ${showFc?`<select onchange="gFc=this.value;rG()"><option value="todos">Todos os consultores</option>${fcOpts}</select>`:''}
    <select onchange="${ftChange}">
      <option value="todos">Todos os tipos</option>
      <option value="mensal" ${ft==='mensal'?'selected':''}>Reunião mensal</option>
      <option value="auditoria" ${ft==='auditoria'?'selected':''}>Auditoria</option>
    </select>
    <button class="btn btn-primary" onclick="${newFn}()">+ Nova visita</button>
  </div>
  <div class="legend">
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#1a4f82"></span>Mensal realizado</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#deeaf7"></span>Mensal agendado</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#2d6a27"></span>Auditoria realizada</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#c8e8c0"></span>Auditoria agendada</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#c2410c"></span>Treinamento</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#6b21a8"></span>Home office</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#0e7490"></span>Férias</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#4a4a4a"></span>Banco de horas</span>
    <span style="display:flex;align-items:center;gap:5px"><span class="ldot" style="background:#c0392b"></span>Cancelada / Remarcada</span>
  </div>
  <div class="gantt-wrap"><div class="gantt-inner" style="--day-w:${Math.round(40*zoom/100)}px;width:${days*Math.round(40*zoom/100)}px">
    <div class="gantt-head"><div class="g-name-col">Consultor</div><div class="g-days-row">${dayH}</div></div>
    ${rows}
  </div></div>`;
}


// ─── COBERTURA HTML ───────────────────────────────────────────────────────────
function hCobertura() {
  const tipos = [
    {key:'auditoria', label:'Auditoria', color:'#1e5c1a', bgV:'#d8f0d0', bgP:'#fee2e2'},
    {key:'mensal',    label:'Reunião Mensal', color:'#1a4f82', bgV:'#deeaf7', bgP:'#fff3cd'},
  ];

  const thStyle = `padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface2)`;
  const tdBase = `padding:7px 10px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top`;

  let html = `<div style="margin-top:12px">
    <div class="section-label">Cobertura de visitas por consultor</div>`;

  tipos.forEach(({key, label, color, bgV, bgP}) => {
    html += `<div style="margin-bottom:28px">
      <div style="font-size:13px;font-weight:600;color:${color};margin-bottom:8px;padding:6px 10px;background:${bgV};border-radius:var(--r);display:inline-block">${label}</div>
      <div style="overflow:auto;border:1px solid var(--border);border-radius:var(--r)">
      <table style="width:100%;border-collapse:collapse;background:var(--surface)">
        <thead><tr>
          <th style="${thStyle}">Consultor</th>
          <th style="${thStyle};color:${color}">Visitadas</th>
          <th style="${thStyle};color:#c0392b">Pendentes</th>
          <th style="${thStyle}">Total carteira</th>
          <th style="${thStyle}">% Cobertura</th>
          <th style="${thStyle}">Unidades visitadas</th>
          <th style="${thStyle}">Unidades pendentes</th>
        </tr></thead>
        <tbody>`;

    CONS.forEach((c, ci) => {
      const carteira = (UNI[c] || []);
      if (!carteira.length) return;

      // Visited = has at least one realizado event of this type
      const visitedUnits = new Set(
        eventos.filter(e => e.consultor===c && e.tipo===key && e.status==='realizado')
               .map(e => e.unidade)
      );
      const pendingUnits = carteira.filter(u => !visitedUnits.has(u));
      const visited = visitedUnits.size;
      const pending = pendingUnits.length;
      const total = carteira.length;
      const pct = total ? Math.round(visited/total*100) : 0;
      const col = pct>=70?'#1e5c1a':pct>=40?'#7a4800':'#c0392b';
      const rowBg = ci%2===0?'var(--surface)':'var(--surface2)';

      const visitedList = [...visitedUnits].sort().map(u => {
        const city = getCity(u);
        const short = u.split(' - ').slice(1).join(' - ')||u;
        return `<div style="font-size:11px;color:#1e5c1a;line-height:1.7">${city?city+' · ':''}${short}</div>`;
      }).join('');

      const pendingList = pendingUnits.sort().map(u => {
        const city = getCity(u);
        const short = u.split(' - ').slice(1).join(' - ')||u;
        return `<div style="font-size:11px;color:#c0392b;line-height:1.7">${city?city+' · ':''}${short}</div>`;
      }).join('');

      html += `<tr style="background:${rowBg}">
        <td style="${tdBase};font-weight:500">${c}</td>
        <td style="${tdBase};text-align:center;font-weight:700;color:${color}">${visited}</td>
        <td style="${tdBase};text-align:center;font-weight:700;color:#c0392b">${pending}</td>
        <td style="${tdBase};text-align:center;color:var(--text2)">${total}</td>
        <td style="${tdBase};text-align:center">
          <span style="font-weight:700;color:${col}">${pct}%</span>
          <div style="margin-top:3px;height:4px;background:var(--border);border-radius:2px;width:60px">
            <div style="height:4px;border-radius:2px;background:${col};width:${pct}%"></div>
          </div>
        </td>
        <td style="${tdBase};max-width:220px">${visitedList||'<span style="color:var(--text3);font-size:11px">Nenhuma</span>'}</td>
        <td style="${tdBase};max-width:220px">${pendingList||'<span style="color:var(--text3);font-size:11px">Todas visitadas ✓</span>'}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  html += `</div>`;
  return html;
}

function extractCity(unidade) {
  const p = unidade.indexOf(' - ');
  if (p === -1) return unidade;
  return unidade.slice(p + 3).trim();
}

function hMapa() {
  return `<div style="margin-top:12px">
    <div class="section-label">Mapa de visitas realizadas</div>
    <div class="map-filter-bar">
      <label>Consultor:</label>
      <select id="map-fc" onchange="renderMap()">
        <option value="todos">Todos</option>
        ${CONS.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div id="map-container"></div>
    <div class="map-legend" id="map-legend"></div>
    <div id="map-status" style="font-size:12px;color:var(--text3);margin-top:6px;text-align:center"></div>
  </div>`;

let mapInstance = null;

function renderMap() {
  const fc = document.getElementById('map-fc')?.value || 'todos';
  const statusEl = document.getElementById('map-status');
  const legendEl = document.getElementById('map-legend');

  if (mapInstance) { mapInstance.remove(); mapInstance = null; }

  const evts = eventos.filter(e => e.status === 'realizado' && (fc === 'todos' || e.consultor === fc));

  if (!evts.length) {
    document.getElementById('map-container').innerHTML = '<div class="empty" style="padding:40px;text-align:center">Nenhuma visita realizada encontrada.</div>';
    if (statusEl) statusEl.textContent = '';
    if (legendEl) legendEl.innerHTML = '';
    return;
  }

  mapInstance = L.map('map-container').setView([-22.5, -46.5], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);

  const consColors = {};
  CONS.forEach((c, i) => { consColors[c] = CONS_COLORS_MAP[i % CONS_COLORS_MAP.length]; });

  const cityGroups = {};
  let plotted = 0, missed = 0;

  evts.forEach(evt => {
    const city = extractCity(evt.unidade);
    const coords = CITY_COORDS[city];
    if (!coords) { missed++; return; }

    // Slight jitter for same-coord grouping
    const jLat = coords[0] + (Math.random() - 0.5) * 0.02;
    const jLng = coords[1] + (Math.random() - 0.5) * 0.02;
    const key = city + '|' + evt.consultor;
    if (!cityGroups[key]) cityGroups[key] = {lat: jLat, lng: jLng, city, consultor: evt.consultor, visits: []};
    cityGroups[key].visits.push(evt.unidade);
    plotted++;
  });

  Object.values(cityGroups).forEach(({lat, lng, city, consultor, visits}) => {
    const color = consColors[consultor] || '#555';
    const circle = L.circleMarker([lat, lng], {
      radius: Math.min(6 + visits.length * 1.5, 16),
      fillColor: color,
      color: '#fff',
      weight: 1.5,
      opacity: 1,
      fillOpacity: 0.85
    });
    const ini = consultor.split(' ').map(w=>w[0]).join('').slice(0,2);
    circle.bindPopup(`<b>${city}</b><br><span style="color:${color}">●</span> ${consultor}<br><small>${visits.join('<br>')}</small>`);
    circle.addTo(mapInstance);
  });

  const activeCons = fc === 'todos' ? CONS.filter(c => evts.some(e => e.consultor === c)) : [fc];
  if (legendEl) legendEl.innerHTML = activeCons.map(c =>
    `<div class="map-leg-item"><div class="map-leg-dot" style="background:${consColors[c]}"></div>${c}</div>`
  ).join('');

  if (statusEl) statusEl.textContent = `${plotted} visita${plotted!==1?'s':''} plotada${plotted!==1?'s':''}${missed?' · '+missed+' sem coordenadas':''}`;
}

function readForm(id){
  const tipo=document.getElementById('f-tipo').value;
  const cons=document.getElementById('f-cons').value;
  const uni=document.getElementById('f-uni').value;
  const ini=document.getElementById('f-ini').value;
  const fim=document.getElementById('f-fim').value;
  const sta=document.getElementById('f-sta').value;
  if(!uni||!ini||!fim){alert('Preencha todos os campos.');return null;}
  if(fim<ini){alert('Data fim não pode ser anterior à data início.');return null;}
  const cf=conflict(cons,tipo,ini,id||null,uni);
  if(cf.length){
    const al=document.getElementById('conf-al');
    const periodo=tipo==='mensal'?'neste mês':'neste semestre';
    al.textContent=`Esta unidade já tem ${tipo==='mensal'?'reunião mensal':'auditoria'} agendada ${periodo}.`;
    al.classList.add('show');return null;
  }
  const transp=document.getElementById('f-transp').value;
  const motivoEl=document.getElementById('f-motivo');
  const motivo=motivoEl?motivoEl.value:'';
  if(id){eventos=eventos.map(e=>e.id===id?{id,consultor:cons,unidade:uni,tipo,inicio:ini,fim:fim,status:sta,transporte:transp,agendadoEm:e.agendadoEm,motivoCancelamento:sta==='cancelado'?motivo:''}:e);}
  else{eventos.push({id:nextId++,consultor:cons,unidade:uni,tipo,inicio:ini,fim:fim,status:sta,transporte:transp,agendadoEm:new Date().toISOString(),motivoCancelamento:''});}
  save();
  return parseD(ini);
}

function hResumo(){
  const consultores = Object.keys(TOTAL_UNI);
  const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  const monthsWithData = [...new Set(
    eventos.filter(e=>e.tipo==='auditoria').map(e=>parseInt(e.inicio.split('-')[1])-1)
  )].sort((a,b)=>a-b);

  function byMes(c, mo, status){
    return eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status===status&&parseInt(e.inicio.split('-')[1])-1===mo).length;
  }
  function totByMes(mo, status){
    return consultores.reduce((s,c)=>s+byMes(c,mo,status),0);
  }

  const thStyle = `padding:8px 10px;text-align:center;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap`;
  const thLeft = `padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em`;

  const monthHeaders = monthsWithData.map(mo=>`
    <th colspan="2" style="${thStyle};border-left:1px solid var(--border)">${MESES[mo]}</th>`).join('');

  const monthSubHeaders = monthsWithData.map(mo=>`
    <th style="${thStyle};border-left:1px solid var(--border);color:#2d6a27;font-size:9px">Real.</th>
    <th style="${thStyle};color:#1a4f82;font-size:9px">Agend.</th>`).join('');

  const rows = consultores.map(c => {
    const col = avc(c);
    const total = TOTAL_UNI[c];
    const realizadas = eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='realizado').length;
    const agendadas = eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='agendado').length;
    const canceladas = eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='cancelado').length;
    const pendentes = total - realizadas - agendadas - canceladas;
    const pct = Math.round(realizadas / total * 100);
    const bc = pct>=70?'#2d6a27':pct>=40?'#7a4800':'#c0392b';

    const monthCells = monthsWithData.map(mo=>{
      const r=byMes(c,mo,'realizado'), a=byMes(c,mo,'agendado');
      return `
        <td style="padding:8px 10px;text-align:center;font-size:12px;border-left:1px solid var(--border);font-family:'DM Mono',monospace;color:#2d6a27;font-weight:${r?'600':'400'}">${r||'-'}</td>
        <td style="padding:8px 10px;text-align:center;font-size:12px;font-family:'DM Mono',monospace;color:#1a4f82">${a||'-'}</td>`;
    }).join('');

    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 14px;white-space:nowrap">
        <div style="display:flex;align-items:center;gap:7px">
          <div class="avatar" style="width:26px;height:26px;font-size:9px;flex-shrink:0;background:${col.bg};color:${col.tc}">${ini2(c)}</div>
          <span style="font-size:12px;font-weight:500">${c}</span>
        </div>
      </td>
      <td style="padding:8px 10px;text-align:center;font-size:12px;font-family:'DM Mono',monospace;font-weight:600">${total}</td>
      <td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;color:#2d6a27">${realizadas}</td>
      <td style="padding:8px 10px;text-align:center;font-size:12px;color:#1a4f82">${agendadas}</td>
      <td style="padding:8px 10px;text-align:center;font-size:12px;color:#c0392b;font-weight:${canceladas?'600':'400'}">${canceladas||'-'}</td>
      <td style="padding:8px 10px;text-align:center;font-size:12px;color:var(--text3)">${pendentes>0?pendentes:'-'}</td>
      <td style="padding:8px 14px;min-width:120px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden">
            <div style="height:100%;border-radius:3px;background:${bc};width:${pct}%"></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:${bc};min-width:30px;text-align:right;font-family:'DM Mono',monospace">${pct}%</span>
        </div>
      </td>
      ${monthCells}
    </tr>`;
  }).join('');

  const totTotal=consultores.reduce((s,c)=>s+TOTAL_UNI[c],0);
  const totReal=consultores.reduce((s,c)=>s+eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='realizado').length,0);
  const totAg=consultores.reduce((s,c)=>s+eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='agendado').length,0);
  const totCanc=consultores.reduce((s,c)=>s+eventos.filter(e=>e.consultor===c&&e.tipo==='auditoria'&&e.status==='cancelado').length,0);
  const totPend=totTotal-totReal-totAg-totCanc;
  const totPct=Math.round(totReal/totTotal*100);
  const totBc=totPct>=70?'#2d6a27':totPct>=40?'#7a4800':'#c0392b';

  const totMonthCells=monthsWithData.map(mo=>{
    const r=totByMes(mo,'realizado'),a=totByMes(mo,'agendado');
    return `<td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;border-left:1px solid var(--border);font-family:'DM Mono',monospace;color:#2d6a27">${r||'-'}</td>
            <td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;color:#1a4f82">${a||'-'}</td>`;
  }).join('');

  return `
  <div class="section-label">Resumo de auditorias — semestre</div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:auto;margin-bottom:16px">
    <table style="width:100%;border-collapse:collapse;min-width:700px">
      <thead>
        <tr style="background:var(--surface2);border-bottom:1px solid var(--border)">
          <th style="${thLeft}" rowspan="2">Consultor</th>
          <th style="${thStyle}" rowspan="2">Total</th>
          <th style="${thStyle}" rowspan="2">Realiz.</th>
          <th style="${thStyle}" rowspan="2">Agend.</th>
          <th style="${thStyle};color:#c0392b" rowspan="2">Cancelad.</th>
          <th style="${thStyle}" rowspan="2">Pend.</th>
          <th style="${thStyle};min-width:110px" rowspan="2">Progresso</th>
          ${monthHeaders}
        </tr>
        <tr style="background:var(--surface2);border-bottom:2px solid var(--border2)">
          ${monthSubHeaders}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:var(--surface2);border-top:2px solid var(--border2)">
          <td style="padding:8px 14px;font-size:12px;font-weight:600">Total geral</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;font-family:'DM Mono',monospace">${totTotal}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;color:#2d6a27">${totReal}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;color:#1a4f82">${totAg}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;font-weight:600;color:#c0392b">${totCanc||'-'}</td>
          <td style="padding:8px 10px;text-align:center;font-size:12px;color:var(--text3)">${totPend>0?totPend:'-'}</td>
          <td style="padding:8px 14px">
            <div style="display:flex;align-items:center;gap:7px">
              <div style="flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden">
                <div style="height:100%;border-radius:3px;background:${totBc};width:${totPct}%"></div>
              </div>
              <span style="font-size:11px;font-weight:600;color:${totBc};min-width:30px;text-align:right;font-family:'DM Mono',monospace">${totPct}%</span>
            </div>
          </td>
          ${totMonthCells}
        </tr>
      </tfoot>
    </table>
  </div>`;
}

// ─── GESTOR ───────────────────────────────────────────────────────────────────
function rG(){
  let h=hMetrics(eventos);
  h+=hTransporte();
  h+=`<div class="tab-row">
    <div class="tab ${gTab==='gantt'?'active':''}" onclick="gTab='gantt';rG()">Gantt do time</div>
    <div class="tab ${gTab==='ind'?'active':''}" onclick="gTab='ind';rG()">Individual</div>
    <div class="tab ${gTab==='resumo'?'active':''}" onclick="gTab='resumo';rG()">Resumo auditorias</div>
    <div class="tab ${gTab==='mapa'?'active':''}" onclick="gTab='mapa';rG()">🗺 Mapa</div>
    <div class="tab ${gTab==='cobertura'?'active':''}" onclick="gTab='cobertura';rG()">📋 Cobertura</div>
  </div>`;
  h+= gTab==='gantt' ? hGantt(gY,gM,gFc,gFt,'gEdit','gNew',true,gZoom) : gTab==='ind' ? hIndividual() : gTab==='resumo' ? hResumo() : gTab==='mapa' ? hMapa() : hCobertura();
  if(gModal) h+=hModal(gEvt||{},false);
  document.getElementById('view-g').innerHTML=h;
  if(gTab==='mapa') setTimeout(renderMap, 50);
}
function gPrev(){gM===0?(gM=11,gY--):gM--;rG();}
function gNext(){gM===11?(gM=0,gY++):gM++;rG();}
function gNew(){gEvt={};gModal=true;rG();}
function gEdit(id){gEvt={...eventos.find(e=>e.id===id)};gModal=true;rG();}
function gClose(){gModal=false;gEvt=null;rG();}
function gDel(id){if(!confirm('Excluir esta visita?'))return;eventos=eventos.filter(e=>e.id!==id);save();gModal=false;gEvt=null;rG();}
function gCancelar(id){if(!confirm('Marcar como cancelada/remarcada? A visita ficará em vermelho no Gantt e uma nova deverá ser criada.'))return;eventos=eventos.map(e=>e.id===id?{...e,status:'cancelado'}:e);save();gModal=false;gEvt=null;rG();}
function gSave(id){const d=readForm(id);if(!d)return;gY=d.getFullYear();gM=d.getMonth();gModal=false;gEvt=null;rG();rC();}

// ─── CONSULTOR ────────────────────────────────────────────────────────────────
let cFt='todos';
function rC(){
  const el=document.getElementById('view-c');
  if(!consAtivo){
    el.innerHTML=`<div class="cons-pick-box">
      <div class="cons-pick-title">Bem-vindo, consultor!</div>
      <div class="cons-pick-sub">Selecione seu nome para registrar suas visitas.</div>
      <div class="cons-pick-row">
        <select id="cpick"><option value="">— escolha seu nome —</option>
          ${CONS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="cLogin()">Entrar</button>
      </div>
    </div>`;
    return;
  }
  const col=avc(consAtivo),g=stats(eventos.filter(e=>e.consultor===consAtivo)),bc=txCol(g.tx);
  const sorted=[...eventos.filter(e=>e.consultor===consAtivo)].sort((a,b)=>b.inicio.localeCompare(a.inicio));
  const rows=sorted.length?sorted.map(e=>`
    <div class="visit-row">
      <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px">
        <div class="visit-unidade">${e.unidade}${getCity(e.unidade)?'<span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:6px">· '+getCity(e.unidade)+'</span>':'' }</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${e.agendadoEm?'📅 Agend. em '+new Date(e.agendadoEm).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">${e.transporte?'✈ '+{aviao:'Avião',carro_proprio:'Carro próprio',frota:'Frota',onibus:'Ônibus',transporte_aplicativo:'Transp. aplicativo'}[e.transporte]||'':''}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="${e.tipo==='mensal'?'tb-m':'tb-a'}">${e.tipo==='mensal'?'Mensal':'Auditoria'}</span>
          <span class="${e.status==='realizado'?'sb-re':e.status==='cancelado'?'sb-ca':'sb-ag'}">${e.status==='cancelado'?'&#9888; cancelado':e.status}</span>
        </div>
      </div>
      <div class="visit-date">${e.inicio}${e.fim!==e.inicio?' → '+e.fim:''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${e.status!=='cancelado'?`<button class="btn btn-sm" onclick="cEdit(${e.id})">Editar</button>`:''}
        ${e.status==='agendado'?`<button class="btn btn-sm btn-success" onclick="cRealizar(${e.id})">&#10003; Realizado</button>`:''}
        ${e.status==='cancelado'?`<button class="btn btn-sm" style="color:var(--text3);cursor:default" disabled>Remarcada</button>`:''}
      </div>
    </div>`).join(''):'<div class="empty">Nenhuma visita ainda. Clique em "+ Nova visita" para começar!</div>';

  let h=`
  <div class="cons-header">
    <div class="avatar" style="background:${col.bg};color:${col.tc};width:48px;height:48px;font-size:15px">${ini2(consAtivo)}</div>
    <div style="flex:1"><div class="cons-hname">${consAtivo}</div><div class="cons-hsub">${sorted.length} visita${sorted.length!==1?'s':''} registrada${sorted.length!==1?'s':''}</div></div>
    <button class="btn btn-sm" onclick="cLogout()">Trocar consultor</button>
  </div>
  <div class="cons-stats">
    <div class="cons-stat"><div class="lbl">Taxa geral</div><div class="val" style="color:${bc}">${g.tx}%</div><div class="sub">${g.real}/${g.tot}</div></div>
    <div class="cons-stat"><div class="lbl">Mensal</div><div class="val" style="color:#1a4f82">${g.txM}%</div><div class="sub">${g.realM}/${g.totM}</div></div>
    <div class="cons-stat"><div class="lbl">Auditoria</div><div class="val" style="color:#1a5216">${g.txA}%</div><div class="sub">${g.realA}/${g.totA}</div></div>
    <div class="cons-stat"><div class="lbl">Pendentes</div><div class="val">${g.tot-g.real}</div><div class="sub">a realizar</div></div>
    ${g.canc>0?`<div class="cons-stat" style="background:#fff5f5;border-color:#f5c6c3"><div class="lbl" style="color:#7a1a1a">&#9888; Canceladas</div><div class="val" style="color:#c0392b">${g.canc}</div><div class="sub" style="color:#7a1a1a">${g.pctCanc}% do agendado</div></div>`:''}
  </div>
  <div class="toolbar"><button class="btn btn-primary" onclick="cNew()">+ Nova visita</button></div>
  <div class="visit-list-wrap">
    <div class="vlist-header"><span class="vlist-title">Minhas visitas</span><span style="font-size:11px;color:var(--text3)">${sorted.length} registros</span></div>
    ${rows}
  </div>`;
  if(cModal) h+=hModal(cEvt||{},true);
  el.innerHTML=h;
}

function cLogin(){const v=document.getElementById('cpick').value;if(!v){alert('Selecione seu nome.');return;}consAtivo=v;document.getElementById('badge-c').textContent=v.split(' ')[0];rC();}
function cLogout(){consAtivo=null;document.getElementById('badge-c').textContent='preencher visitas';rC();}
function cNew(){cEvt={consultor:consAtivo};cModal=true;rC();}
function cEdit(id){cEvt={...eventos.find(e=>e.id===id)};cModal=true;rC();}
function cClose(){cModal=false;cEvt=null;rC();}
function cDel(id){if(!confirm('Excluir?'))return;eventos=eventos.filter(e=>e.id!==id);save();cModal=false;cEvt=null;rC();rG();}
function cCancelar(id){if(!confirm('Marcar como cancelada/remarcada? A visita ficará em vermelho e uma nova deverá ser criada.'))return;eventos=eventos.map(e=>e.id===id?{...e,status:'cancelado'}:e);save();cModal=false;cEvt=null;rC();rG();}
function cRealizar(id){eventos=eventos.map(e=>e.id===id?{...e,status:'realizado'}:e);save();rC();rG();}
function cSave(id){const d=readForm(id);if(!d)return;cModal=false;cEvt=null;rC();rG();}

// ─── NAVEGAÇÃO ────────────────────────────────────────────────────────────────
function switchView(v){
  view=v;
  document.getElementById('atab-g').className='app-tab'+(v==='gestor'?' active':'');
  document.getElementById('atab-c').className='app-tab'+(v==='consultor'?' active':'');
  document.getElementById('view-g').style.display=v==='gestor'?'block':'none';
  document.getElementById('view-c').style.display=v==='consultor'?'block':'none';
}

// ─── SYNC MANUAL ─────────────────────────────────────────────────────────────
async function syncManual(){
  const ok = await loadFromSheets();
  if(ok){ rG(); rC(); }
  else { setSyncStatus('err'); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async function(){
  const n=now(); gY=n.getFullYear(); gM=n.getMonth();
  document.getElementById('today-lbl').textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  // carrega local primeiro (instantâneo)
  load();
  rG(); rC();
  // depois tenta buscar dados atualizados da planilha
  const ok = await loadFromSheets();
  if(ok){ rG(); rC(); }
  // sincroniza outras abas do mesmo navegador
  window.addEventListener('storage', e=>{ if(e.key===KEY){ loadLocal(); rG(); rC(); } });
  // auto-sync a cada 60s
  setInterval(async()=>{ const ok=await loadFromSheets(); if(ok){rG();rC();} }, 60000);
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
